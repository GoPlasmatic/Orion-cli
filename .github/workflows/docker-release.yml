name: Docker Release

permissions:
  contents: read
  packages: write

on:
  # Trigger on version tags (same pattern as release.yml)
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  # Allow manual trigger with options
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but don't push)"
        type: boolean
        default: false
      tag_override:
        description: "Version tag override (e.g. 0.1.0)"
        type: string
        required: false

env:
  GHCR_IMAGE: ghcr.io/goplasmatic/orion-cli

jobs:
  # Determine version once, share across jobs
  prepare:
    name: Prepare
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.tag_override }}" ]; then
            VERSION="${{ inputs.tag_override }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

  # Build per-platform images natively in parallel
  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-22.04
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=sha,prefix=
          flavor: |
            latest=auto

      # Build and push by digest (no tag yet — tags are applied in the merge step)
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ !inputs.dry_run }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=${{ !inputs.dry_run }}

      - name: Export digest
        if: ${{ !inputs.dry_run }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge platform images into a multi-arch manifest
  merge:
    name: Merge & Push Manifest
    needs: [prepare, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=sha,prefix=
          flavor: |
            latest=auto

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.GHCR_IMAGE }}@sha256:%s ' *)

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect "${{ env.GHCR_IMAGE }}:${{ needs.prepare.outputs.version }}"

  # Publish/update the server listing in the official MCP registry.
  # OIDC from this repo grants the io.github.GoPlasmatic/* namespace (case-sensitive); the pushed
  # image must carry the io.modelcontextprotocol.server.name label (see Dockerfile).
  # Docs: https://modelcontextprotocol.io/registry/github-actions
  publish-mcp:
    name: Publish to MCP Registry
    needs: [prepare, merge]
    # Runs on version tags, or on manual dispatch with tag_override (re-publish path)
    if: ${{ !inputs.dry_run && (github.ref_type == 'tag' || inputs.tag_override != '') }}
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install mcp-publisher
        run: |
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64) ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
          esac
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" \
            | tar xz mcp-publisher

      - name: Sync server.json to release version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          jq --arg v "$VERSION" \
            '.version = $v | .packages[0].identifier = "ghcr.io/goplasmatic/orion-cli:" + $v' \
            server.json > server.json.tmp && mv server.json.tmp server.json

      - name: Publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
